<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobar Enthusiast</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4ece1; /* Earthy background */
            color: #4a3728; /* Deep brown text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-bottom: 8px solid #8b5a2b;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #5d4037;
        }
        p {
            font-size: 1.2rem;
            font-style: italic;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 15px;
            background-color: #8b5a2b;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🌱</div>
        <h1>I Love Gobar</h1>
        <p>Embracing the organic, the traditional, and the sustainable.</p>
        <div class="badge">Eco-Friendly Living</div>
    </div>

</body>
</html>
